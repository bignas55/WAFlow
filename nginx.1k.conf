user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 100M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=1000r/s;

  # Upstream - Load balancing across 3 instances
  upstream waflow_backend {
    least_conn;
    server waflow-1:3000 weight=1 max_fails=3 fail_timeout=30s;
    server waflow-2:3001 weight=1 max_fails=3 fail_timeout=30s;
    server waflow-3:3002 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # Health check endpoint
    location /health {
      access_log off;
      proxy_pass http://waflow_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # Auth endpoints - strict rate limiting
    location ~ ^/api/trpc/auth\. {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://waflow_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }

    # Webhook endpoints - high rate limit
    location ~ ^/api/webhooks/ {
      limit_req zone=webhook burst=100 nodelay;
      proxy_pass http://waflow_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # API endpoints - general rate limiting
    location /api/ {
      limit_req zone=general burst=20 nodelay;
      proxy_pass http://waflow_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 60s;
    }

    # WebSocket support
    location /socket.io {
      proxy_pass http://waflow_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Frontend
    location / {
      proxy_pass http://waflow_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_buffering off;
    }
  }
}
