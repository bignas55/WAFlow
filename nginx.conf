user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10000;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format detailed '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/s;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=100r/s;

    # Upstream WAFlow application
    upstream waflow_backend {
        least_conn;
        server waflow:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name staging.yourdomain.com;

        # SSL Configuration - Update paths to your certificates
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;

        # Proxy settings for WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts for long-running requests
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;

        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://waflow_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API routes
        location /api {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://waflow_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log /var/log/nginx/api_access.log detailed;
        }

        # Auth routes - stricter rate limiting
        location /api/trpc/auth {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://waflow_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Webhook routes - high rate limit for WhatsApp
        location /webhook {
            limit_req zone=webhook_limit burst=100 nodelay;
            proxy_pass http://waflow_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log /var/log/nginx/webhook_access.log detailed;
        }

        # WebSocket support for Socket.IO
        location /socket.io {
            proxy_pass http://waflow_backend;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Upgrade $http_upgrade;
        }

        # Static files - serve with caching
        location ~* ^/(images|js|css|fonts)/ {
            proxy_pass http://waflow_backend;
            proxy_cache off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Frontend routing - all unmatched paths to index.html
        location / {
            proxy_pass http://waflow_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Handle 404 for frontend routes
            error_page 404 =200 /index.html;
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
